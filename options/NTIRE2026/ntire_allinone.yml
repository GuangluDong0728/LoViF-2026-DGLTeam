# general settings
name: NTIRE_2026_ALLINONE_5TASK_DualPromptRestormerv3_only_task_prompt
model_type: NTIREALLINONEModel 
scale: 1
num_gpu: 1
manual_seed: 42

# dataset and data loader settings
datasets:
  train:
    name: MultiDatasetPairedImageDataset
    type: MultiDatasetPairedImageDataset
    
    # Batch size for training
    batch_size: 5 # Will be distributed: 4 samples per dataset (24/6=4)
    
    # Global training parameters
    phase: train
    gt_size: 128      # Crop size for GT images
    scale: 1          # Scale factor for super-resolution
    use_hflip: true    # Use horizontal flip
    use_rot: true      # Use rotation
    
    # Configuration for 6 datasets
    datasets:
      # Dataset 1: Super-Resolution (e.g., DIV2K)
      - name: "Blur"
        dataroot_gt: "/root/autodl-tmp/unsupervised deraining/datasets/Real-World All-in-One/Train/Blur/GT"
        dataroot_lq: "/root/autodl-tmp/unsupervised deraining/datasets/Real-World All-in-One/Train/Blur/LQ"
        augment_factor: 1   # 200 images -> 1000 images
        weight: 1.0          # Sampling weight
        io_backend:
          type: disk
        filename_tmpl: "{}"
        
      # Dataset 2: Denoising (e.g., BSD400)
      - name: "Haze"
        dataroot_gt: "/root/autodl-tmp/unsupervised deraining/datasets/Real-World All-in-One/Train/Haze/GT"
        dataroot_lq: '/root/autodl-tmp/unsupervised deraining/datasets/Real-World All-in-One/Train/Haze/LQ'
        augment_factor: 1   # 100 images -> 1000 images
        weight: 1.0
        io_backend:
          type: disk
        
      # Dataset 3: Deblurring (e.g., GoPro)
      - name: "Lowlight"
        dataroot_gt: "/root/autodl-tmp/unsupervised deraining/datasets/Real-World All-in-One/Train/Lowlight/GT"
        dataroot_lq: "/root/autodl-tmp/unsupervised deraining/datasets/Real-World All-in-One/Train/Lowlight/LQ"
        augment_factor: 1    # 500 images -> 1500 images
        weight: 1.0          # Higher weight = more likely to get extra samples
        io_backend:
          type: disk
          
      # Dataset 4: Rain Removal
      - name: "Rain"
        dataroot_gt: "/root/autodl-tmp/unsupervised deraining/datasets/Real-World All-in-One/Train/Rain/GT"
        dataroot_lq: "/root/autodl-tmp/unsupervised deraining/datasets/Real-World All-in-One/Train/Rain/LQ"
        augment_factor: 1   # 100 images -> 1500 images
        weight: 1.0
        io_backend:
          type: disk
          
      # Dataset 5: Haze Removal
      - name: "Snow"
        dataroot_gt: "/root/autodl-tmp/unsupervised deraining/datasets/Real-World All-in-One/Train/Snow/GT"
        dataroot_lq: "/root/autodl-tmp/unsupervised deraining/datasets/Real-World All-in-One/Train/Snow/LQ"
        augment_factor: 1   # 1000 images -> 2000 images
        weight: 1.0
        io_backend:
          type: disk

    # data loader
    num_worker_per_gpu: 6
    batch_size_per_gpu: 5
    dataset_enlarge_ratio: 1
    prefetch_mode: ~

  val_1:
    name: Blur
    type: PairedImageDataset
    dataroot_gt: /root/autodl-tmp/unsupervised deraining/datasets/Real-World All-in-One/test_from_train/Blur/GT
    dataroot_lq: /root/autodl-tmp/unsupervised deraining/datasets/Real-World All-in-One/test_from_train/Blur/LQ
    filename_tmpl: '{}'
    io_backend:
      type: disk

  val_2:
    name: Haze
    type: PairedImageDataset
    dataroot_gt: /root/autodl-tmp/unsupervised deraining/datasets/Real-World All-in-One/test_from_train/Haze/GT
    dataroot_lq: /root/autodl-tmp/unsupervised deraining/datasets/Real-World All-in-One/test_from_train/Haze/LQ
    filename_tmpl: '{}'
    io_backend:
      type: disk

  val_3:
    name: Lowlight
    type: PairedImageDataset
    dataroot_gt: /root/autodl-tmp/unsupervised deraining/datasets/Real-World All-in-One/test_from_train/Lowlight/GT
    dataroot_lq: /root/autodl-tmp/unsupervised deraining/datasets/Real-World All-in-One/test_from_train/Lowlight/LQ
    filename_tmpl: '{}'
    io_backend:
      type: disk

  val_4:
    name: Rain
    type: PairedImageDataset
    dataroot_gt: /root/autodl-tmp/unsupervised deraining/datasets/Real-World All-in-One/test_from_train/Rain/GT
    dataroot_lq: /root/autodl-tmp/unsupervised deraining/datasets/Real-World All-in-One/test_from_train/Rain/LQ
    filename_tmpl: '{}'
    io_backend:
      type: disk

  val_5:
    name: Snow
    type: PairedImageDataset
    dataroot_gt: /root/autodl-tmp/unsupervised deraining/datasets/Real-World All-in-One/test_from_train/Snow/GT
    dataroot_lq: /root/autodl-tmp/unsupervised deraining/datasets/Real-World All-in-One/test_from_train/Snow/LQ
    filename_tmpl: '{}'
    io_backend:
      type: disk

network_g:
  type: DualPromptRestormerv3_only_task_prompt
  img_channel: 3
  # dim: None
  # width: None
  enc_blk_nums: [4, 6, 6] 
  middle_blk_num: 8       
  dec_blk_nums: [6, 6, 4]
  refine_blk_num: 4    
  heads: [1, 2, 4, 8]
  ffn_expansion_factor: 2.66
  # bias: False
  LayerNorm_type: 'WithBias'
  
  # 提示池配置
  use_prompt: true
  degradation_pool_size: 15
  degradation_prompt_dim: 1024
  degradation_top_k: 3
  value_num_tokens: 2 
  fusion_method: 'cross_attention' 

# path
path:
  pretrain_network_g: ~
  param_key_g: params

# training settings
train:
  # EMA设置
  # ema_decay: 0.999
  optim_g:
    type: Adam
    lr: !!float 4e-4
    weight_decay: 0
    betas: [0.9, 0.99]

  prompt_lr: !!float 4e-4  
  
  scheduler:
    type: CosineAnnealingRestartLR
    periods: [1000000]
    restart_weights: [1]
    eta_min: !!float 1e-6

  warmup_iter: 1000
  
  # use_amp: true
  # grad_clip: 1.0
  
  total_iter: 1000000
  # warmup_iter: -1  # no warm up

  # 基础损失函数
  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean
  fft_opt:
    type: FFTLoss
    loss_weight: 0.1
    
  # # 可选的感知损失
  # perceptual_opt:
  #   type: PerceptualLoss
  #   layer_weights:
  #     'conv1_2': 0.1
  #     'conv2_2': 0.1
  #     'conv3_4': 1
  #     'conv4_4': 1
  #     'conv5_4': 1
  #   vgg_type: vgg19
  #   use_input_norm: true
  #   perceptual_weight: !!float 0.01
  #   style_weight: 0
  #   range_norm: false
  #   criterion: l1

  enable_prompt_analysis: false           # 是否启用详细提示分析
  prompt_analysis_freq: 50000            # 执行详细分析的频率（迭代数）
  prompt_analysis_save_path: './prompt_analysis'  # 分析结果保存路径

# validation settings
val:
  val_freq: !!float 10000
  save_img: false
  pbar: true

  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false
    ssim:
      type: calculate_ssim
      crop_border: 0
      test_y_channel: false

# logging settings
logger:
  print_freq: 100
  save_checkpoint_freq: !!float 10000
  use_tb_logger: true
  # wandb:
  #   project: MultiDomain_Image_Restoration
  #   resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500
